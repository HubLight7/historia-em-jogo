<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minigame - Expedições Portuguesas</title>
  <link rel="stylesheet" href="../historia-cap7/style.css" />
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
    }

    #comic-container {
      width: min(100vw, 1200px);
      height: min(85vh, calc(100vw * 9 / 16));
      border: 6px solid #000;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 0 3px #ffffff;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="comic-container"></div>

  <script type="module">
    import Phaser from 'https://cdn.jsdelivr.net/npm/phaser@4.0.0/+esm';
    import MenuScene from './MenuScene.js';
    import { TutorialScene, GameScene } from './TutorialScene.js';

    const config = {
      type: Phaser.AUTO,
      width: 1200,
      height: 675,
      parent: 'comic-container',
      dom: { createContainer: true },
      backgroundColor: '#0b1020',
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: [MenuScene, TutorialScene, GameScene]
    };

    new Phaser.Game(config);
  </script>
</body>
</html>
